<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Inventory Management System</h1>

    <input
        type="text"
        id="search"
        placeholder="Search Products..."
    >
</header>

<div class="dashboard">

    <div class="box">
        <h2 id="totalProducts">0</h2>
        <p>Total Products</p>
    </div>

    <div class="box">
        <h2 id="totalStock">0</h2>
        <p>Total Stock</p>
    </div>

    <div class="box">
        <h2 id="lowStock">0</h2>
        <p>Low Stock Items</p>
    </div>

</div>

<div id="products"></div>

<script src="script.js"></script>

</body>
</html>
